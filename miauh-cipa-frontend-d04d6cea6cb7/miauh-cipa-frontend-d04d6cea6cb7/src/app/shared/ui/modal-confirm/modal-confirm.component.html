<div class="borderModal">
    <mat-toolbar role="toolbar" class="task-header">
        <span>{{title}}</span>
        <span class="fx-spacer"></span>
        <button id="butoncierre" style="float:right" mat-icon-button (click)="dialogRef.close()">
            <mat-icon mat-list-icon>close</mat-icon>
        </button>
    </mat-toolbar>
    <mat-dialog-content class="mat-typography">
        <div class="container-fluid">
            <p>{{content}}</p>
            <div class="row justify-content-center gap-2">
                <button style="margin-top: 10px;width: 150px;" mat-button type="button"
                    (click)="dialogRef.close()">Cancelar</button>
                <button style="margin-top: 10px;width: 150px;" mat-raised-button color="warn" type="button"
                    (click)="deleteGroup()">Borrar</button>
            </div>
        </div>
    </mat-dialog-content>
</div>
